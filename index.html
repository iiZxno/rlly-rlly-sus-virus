<!DOCTYPE html>
<html>
<head>
<title>For Leon</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inspiration&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background-image: url(pebblebg.gif);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    font-family:Arial,sans-serif;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    position:relative;
}

/* dark overlay */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* Title */
h1{
    font-size:4rem;
    font-family: 'Inspiration', cursive;
    margin-bottom:20px;
}

/* Button */
#enterBtn{
    margin-top:30px;
    padding:15px 40px;
    font-size:1.5rem;
    border:none;
    border-radius:20px;
    background:black;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

#enterBtn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px green;
}
</style>

</head>

<body>

<h1>For Leon</h1>

<button id="enterBtn"
onclick="window.location.href='https://iizxno.github.io/rlly-rlly-sus-virus/birthday'">
Enter
</button>

</body>
</html>
